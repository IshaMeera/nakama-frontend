services:
  postgres:
    image: postgres:12.2-alpine
    container_name: nakama-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: nakama
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"

  nakama:
    image: heroiclabs/nakama:3.16.0
    container_name: nakama-server
    depends_on:
      - postgres
    volumes:
      - ./local.yml:/nakama/data/local.yml
    command:
      - "/nakama/nakama"
      - "--config"
      - "/nakama/data/local.yml"
    ports:
      - "7350:7350"